name: Snakeball
options:
  bundleIdPrefix: studio.hodgepodge
  deploymentTarget:
    iOS: "16.0"
  createIntermediateGroups: true

packages:
  GoogleMobileAds:
    url: https://github.com/googleads/swift-package-manager-google-mobile-ads.git
    from: "13.1.0"

targets:
  Snakeball:
    type: application
    platform: iOS
    sources:
      - path: Snakeball
        excludes:
          - "Snakeball.storekit"   # dev StoreKit config; attach via the scheme, not bundled
    dependencies:
      - package: GoogleMobileAds
        product: GoogleMobileAds
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: studio.hodgepodge.snakeball
        MARKETING_VERSION: "1.0.0"
        CURRENT_PROJECT_VERSION: "1"
        GENERATE_INFOPLIST_FILE: "YES"
        INFOPLIST_FILE: Snakeball/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        TARGETED_DEVICE_FAMILY: "1"
        SWIFT_VERSION: "5.0"
        CODE_SIGN_STYLE: Automatic
